<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JoppeWind</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Archivo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #eef4f9; font-family: 'DM Sans', sans-serif; }
:root {
  --sky: #1a5c8a; --sky-light: #3a7db5; --sky-pale: #d4e8f5;
  --gust: #5b9ec9; --bg: #f0f7fc; --card: #fff;
  --text: #0f172a; --muted: #64748b; --border: #e2eaf2;
}
#root { display: flex; justify-content: center; min-height: 100%; }
.banner-stars {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.1) 0%, transparent 2%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.1) 0%, transparent 2%),
    radial-gradient(circle at 45% 85%, rgba(255,255,255,.1) 0%, transparent 2%),
    radial-gradient(circle at 85% 40%, rgba(255,255,255,.08) 0%, transparent 2%);
  background-size: 120px 120px;
}
.app { width: 100%; max-width: 430px; background: var(--bg); min-height: 100vh; padding-bottom: 40px; }
.card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(2,132,199,.06); overflow: hidden; }
.tweaks-panel {
  position: fixed; bottom: 20px; right: 20px;
  background: #1e293b; color: #f1f5f9; border-radius: 14px; padding: 18px;
  width: 270px; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,.3); font-size: 13px; display: none;
}
.tweaks-panel.visible { display: block; }
.tweaks-panel h4 { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #94a3b8; margin-bottom: 14px; }
.tweak-row { display: flex; flex-direction: column; margin-bottom: 12px; }
.tweak-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.tweak-row label { color: #94a3b8; font-size: 11px; }
.tweak-row select { background: #334155; border: none; color: #f1f5f9; border-radius: 6px; padding: 5px 8px; font-size: 13px; width: 100%; }
.tweak-row input[type=range] { width: 100%; accent-color: #38bdf8; }
.tweak-val { font-size: 15px; font-weight: 700; color: #38bdf8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const LAT = 52.1886, LON = 4.5185, SPOT = "'t Joppe";

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "unit": "kn",
  "margMin": 16.5,
  "redMin": 17.5,
  "goodMin": 19,
  "greatMin": 24,
  "stormMin": 30
}/*EDITMODE-END*/;

/* ── helpers ── */
const COMPASS = ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
const degToCompass = d => COMPASS[Math.round(d / 22.5) % 16];

function toUnit(kn, unit) {
  if (unit === 'bft') return Math.min(12, Math.round(Math.pow(kn / 1.625, 2/3)));
  if (unit === 'm/s') return +(kn * 0.5144).toFixed(1);
  if (unit === 'km/h') return Math.round(kn * 1.852);
  return Math.round(kn);
}
const unitLbl = u => ({ kn:'kn', bft:'Bft', 'm/s':'m/s', 'km/h':'km/h' }[u] || u);

/* 5-category suitability */
function suit(knots, tw) {
  if (knots < tw.margMin)  return { key:'none',  label:'Te weinig',  short:'Te weinig', color:'#94a3b8', bg:'#f1f5f9',  dotColor:'#94a3b8' };
  if (knots < tw.redMin)   return { key:'marg',  label:'Marginaal',  short:'Marginaal', color:'#d97706', bg:'#fef3c7',  dotColor:'#f59e0b' };
  if (knots < tw.goodMin)  return { key:'red',   label:'Redelijk',   short:'Redelijk',  color:'#ca8a04', bg:'#fefce8',  dotColor:'#eab308' };
  if (knots < tw.greatMin) return { key:'good',  label:'Goed',       short:'Goed',      color:'#16a34a', bg:'#dcfce7',  dotColor:'#22c55e' };
  if (knots < tw.stormMin) return { key:'great', label:'Heel goed',  short:'Heel goed', color:'#1a5c8a', bg:'#d4e8f5',  dotColor:'#3a7db5' };
  return                          { key:'storm', label:'Hard',       short:'Hard',      color:'#dc2626', bg:'#fee2e2',  dotColor:'#ef4444' };
}

/* ── WindArrow ── */
const WindArrow = ({ deg=0, size=20, color='#0284c7', opacity=1 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" style={{ opacity, display:'block', flexShrink:0 }}>
    <g transform={`rotate(${deg+180},12,12)`}>
      <polygon points="12,2 16,20 12,16 8,20" fill={color}/>
    </g>
  </svg>
);

/* ── Advanced Wind Rose: polar petals ── */
function WindRose({ speeds=[], dirs=[], size=120 }) {
  const SECTORS = 16;
  const buckets = Array(SECTORS).fill(0).map(() => ({ count:0, speedSum:0 }));
  dirs.forEach((d,i) => {
    const idx = Math.round(d / (360/SECTORS)) % SECTORS;
    buckets[idx].count++;
    buckets[idx].speedSum += (speeds[i] || 0);
  });
  const maxCount = Math.max(...buckets.map(b=>b.count), 1);
  const cx = size/2, cy = size/2;
  const maxR = size * 0.38;
  const step = (2*Math.PI) / SECTORS;

  const cardinals = [
    {label:'N', ang:-Math.PI/2},
    {label:'O', ang:0},
    {label:'Z', ang:Math.PI/2},
    {label:'W', ang:Math.PI},
  ];

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} overflow="visible" style={{ display:'block', margin:'0 auto' }}>
      {/* rings */}
      {[.33,.66,1].map(f=>(
        <circle key={f} cx={cx} cy={cy} r={maxR*f} fill="none" stroke="#e2eaf2" strokeWidth={1}/>
      ))}
      {/* axis lines */}
      {[0,1,2,3].map(i=>{
        const a = i * Math.PI/2 - Math.PI/2;
        return <line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*maxR} y2={cy+Math.sin(a)*maxR} stroke="#e2eaf2" strokeWidth={1}/>;
      })}
      {/* petals */}
      {buckets.map((b, i) => {
        const r = (b.count / maxCount) * maxR;
        const avgSpd = b.count > 0 ? b.speedSum / b.count : 0;
        // color by avg speed
        const pct = Math.min(avgSpd / 30, 1);
        const cr = Math.round(0xd4 + (0x1a - 0xd4) * pct);
        const cg = Math.round(0xe8 + (0x5c - 0xe8) * pct);
        const cb = Math.round(0xf5 + (0x8a - 0xf5) * pct);
        const color = `rgb(${cr},${cg},${cb})`;
        const ang = i * step - Math.PI/2;
        const a0 = ang - step/2, a1 = ang + step/2;
        if (r < 2) return null;
        const x0=cx+Math.cos(a0)*r, y0=cy+Math.sin(a0)*r;
        const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r;
        const d = `M${cx},${cy} L${x0},${y0} A${r},${r} 0 0,1 ${x1},${y1} Z`;
        return <path key={i} d={d} fill={color} opacity={0.82}/>;
      })}
      {/* cardinal labels */}
      {cardinals.map(({label,ang}) => {
        const d = maxR + size*.11;
        return <text key={label} x={cx+Math.cos(ang)*d} y={cy+Math.sin(ang)*d+3.5}
          textAnchor="middle" fontSize={size*.1} fontWeight="700"
          fill="#1e293b" stroke="white" strokeWidth="2" strokeLinejoin="round"
          paintOrder="stroke" fontFamily="Arial,sans-serif">{label}</text>;
      })}
    </svg>
  );
}

/* ── 12h Bar Chart ── */
function WindChart({ hours, unit, selectedIdx, currentIdx, onSelect }) {
  if (!hours.length) return null;
  const BAR_H = 80;
  const PX_PER_KN = 2; // 40 kn = volle balk
  return (
    <div>
      <div style={{ overflowX:'auto', paddingBottom:4 }}>
      <div style={{ display:'flex', alignItems:'flex-end', gap:3, padding:'4px 2px 0', minWidth: hours.length*42 }}>
        {hours.map((h) => {
          const isPast = h.isPast;
          const isSelected = h.globalIdx === selectedIdx;
          const isNow = h.globalIdx === currentIdx;
          const gH = Math.min(BAR_H, h.gust * PX_PER_KN);
          const sH = Math.min(BAR_H, h.speed * PX_PER_KN);
          return (
            <div key={h.time} onClick={() => onSelect(h.globalIdx)}
              style={{ flex:'0 0 38px', display:'flex', flexDirection:'column', alignItems:'center', gap:3, position:'relative', cursor:'pointer' }}>
              {/* background pill for selected hour */}
              {isSelected && <div style={{
                position:'absolute', pointerEvents:'none',
                top: -3, left: -3, right: -3, bottom: -3,
                background: 'rgba(26,92,138,0.10)',
                borderRadius: 8,
              }}/>}
              {/* small "Nu" dot above bar for actual current time */}
              {isNow && <div style={{
                position:'absolute', top: -3, left:'50%', transform:'translateX(-50%)',
                width: 5, height: 5,
                background: isSelected ? 'var(--sky)' : '#94a3b8',
                borderRadius: '50%',
              }}/>}
              <div style={{ width:26, height:BAR_H, position:'relative', display:'flex', alignItems:'flex-end' }}>
                <div style={{ position:'absolute', bottom:0, left:0, right:0, height:gH, background: isPast?'#cbd5e1':'var(--gust)', borderRadius:'4px 4px 0 0' }}/>
                <div style={{ position:'absolute', bottom:0, left:0, right:0, height:sH, background: isPast?'#94a3b8':'var(--sky)', borderRadius:'4px 4px 0 0' }}/>
              </div>
              <div style={{ fontSize:10, fontWeight: isSelected?700:400, color: isPast?'var(--muted)':'var(--text)', lineHeight:1 }}>
                {toUnit(h.speed, unit)}
              </div>
              <div style={{ fontSize:9, color: isPast?'#cbd5e1':'var(--gust)', lineHeight:1, fontWeight:500 }}>
                {toUnit(h.gust, unit)}
              </div>
              <WindArrow deg={h.dir} size={13} color={isPast?'#94a3b8':'var(--sky)'}/>
              <div style={{ fontSize:9, color:'var(--muted)', lineHeight:1 }}>{h.label}</div>
            </div>
          );
        })}
      </div>
      </div>
      <div style={{ display:'flex', gap:12, padding:'8px 2px 0', fontSize:11, color:'var(--muted)' }}>
        <span style={{ display:'flex', gap:4, alignItems:'center' }}><span style={{ width:10, height:10, borderRadius:2, background:'var(--sky)', display:'inline-block' }}/>snelheid (boven)</span>
        <span style={{ display:'flex', gap:4, alignItems:'center' }}><span style={{ width:10, height:10, borderRadius:2, background:'var(--gust)', display:'inline-block' }}/>vlagen (onder)</span>
        <span style={{ display:'flex', gap:4, alignItems:'center' }}><span style={{ width:10, height:10, borderRadius:2, background:'#cbd5e1', display:'inline-block' }}/>verleden</span>
      </div>
    </div>
  );
}

/* ── Map ── */
function SpotMap({ lat, lon, onMove, windDir=0, windSpeed=0 }) {
  const divRef    = useRef(null);
  const mapRef    = useRef(null);
  const markerRef = useRef(null);
  const canvasRef = useRef(null);
  const animRef   = useRef(null);
  const ptcRef    = useRef([]);

  useEffect(() => {
    if (mapRef.current || !divRef.current) return;
    const icon = L.divIcon({ className:'', html:'<div style="width:14px;height:14px;background:#1a5c8a;border:3px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>', iconSize:[14,14], iconAnchor:[7,7] });
    const map = L.map(divRef.current, { zoomControl:true, scrollWheelZoom:false, attributionControl:true })
      .setView([lat, lon], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      maxZoom: 19,
    }).addTo(map);
    markerRef.current = L.marker([lat, lon], { icon }).addTo(map);
    map.on('click', e => onMove(+e.latlng.lat.toFixed(4), +e.latlng.lng.toFixed(4)));
    mapRef.current = map;
  }, []);

  useEffect(() => {
    if (!markerRef.current || !mapRef.current) return;
    markerRef.current.setLatLng([lat, lon]);
    mapRef.current.setView([lat, lon], mapRef.current.getZoom());
  }, [lat, lon]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.width  = 400;
    canvas.height = 200;
    const W = canvas.width, H = canvas.height;
    const ctx = canvas.getContext('2d');

    const baseRad = (windDir * Math.PI) / 180;
    const baseSpeed = Math.max(0.3, windSpeed * 0.09);
    const NUM = 60;

    const spawn = () => {
      const jitter = (Math.random() - 0.5) * 0.18; // ±~10° richting variatie
      const r   = baseRad + jitter;
      const spd = baseSpeed * (0.6 + Math.random() * 0.9);
      const tail = spd * (14 + Math.random() * 10);
      const vx  = -Math.sin(r), vy = Math.cos(r);
      let x, y;
      if (Math.random() > 0.3) {
        if (Math.abs(vx) >= Math.abs(vy)) {
          x = vx > 0 ? -tail : W + tail; y = Math.random() * H;
        } else {
          x = Math.random() * W; y = vy > 0 ? -tail : H + tail;
        }
      } else {
        x = Math.random() * W; y = Math.random() * H;
      }
      return { x, y, vx, vy, spd, tail, age: 0, maxAge: 60 + Math.random() * 60 };
    };

    ptcRef.current = Array.from({ length: NUM }, () => ({ ...spawn(), age: Math.random() * 80 }));

    const animate = () => {
      ctx.clearRect(0, 0, W, H);
      ptcRef.current.forEach(p => {
        const alpha = Math.sin((p.age / p.maxAge) * Math.PI);
        const tx = p.x - p.vx * p.tail, ty = p.y - p.vy * p.tail;
        const grad = ctx.createLinearGradient(tx, ty, p.x, p.y);
        grad.addColorStop(0, `rgba(255,255,255,0)`);
        grad.addColorStop(1, `rgba(255,255,255,${alpha * 0.9})`);

        // glow laag
        ctx.beginPath();
        ctx.strokeStyle = grad;
        ctx.lineWidth = 3.5;
        ctx.moveTo(tx, ty); ctx.lineTo(p.x, p.y);
        ctx.stroke();
        // scherpe kern
        const grad2 = ctx.createLinearGradient(tx, ty, p.x, p.y);
        grad2.addColorStop(0, `rgba(255,255,255,0)`);
        grad2.addColorStop(1, `rgba(255,255,255,${alpha})`);
        ctx.beginPath();
        ctx.strokeStyle = grad2;
        ctx.lineWidth = 1;
        ctx.moveTo(tx, ty); ctx.lineTo(p.x, p.y);
        ctx.stroke();

        p.x += p.vx * p.spd; p.y += p.vy * p.spd; p.age++;
        if (p.age > p.maxAge || p.x < -p.tail-5 || p.x > W+p.tail+5 || p.y < -p.tail-5 || p.y > H+p.tail+5) {
          Object.assign(p, spawn());
        }
      });
      animRef.current = requestAnimationFrame(animate);
    };
    animate();
    return () => cancelAnimationFrame(animRef.current);
  }, [windDir, windSpeed]);

  return (
    <div style={{ position:'relative', width:'100%', height:200 }}>
      <div ref={divRef} style={{ width:'100%', height:200 }}/>
      <canvas ref={canvasRef} style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:500 }}/>
    </div>
  );
}

/* ── App ── */
function App() {
  const [pos, setPos]         = useState({ lat: LAT, lon: LON });
  const [apiData, setApiData] = useState(null);
  const [error, setError]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [tw, setTw]           = useState(TWEAK_DEFAULTS);
  const [twOpen, setTwOpen]   = useState(false);
  const [updated, setUpdated] = useState(null);
  const [selectedDay, setSelectedDay]         = useState(null);
  const [selectedHourIdx, setSelectedHourIdx] = useState(null);
  const [refreshing, setRefreshing]           = useState(false);

  const moveToPos = (lat, lon) => {
    setPos({ lat, lon });
    setError(null);
    setSelectedDay(null);
    setSelectedHourIdx(null);
    setRefreshing(true);
  };

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTwOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTwOpen(false);
    });
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tw, [k]: v };
    setTw(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
  };

  useEffect(() => {
    const BASE = `https://api.open-meteo.com/v1/forecast?latitude=${pos.lat}&longitude=${pos.lon}&hourly=windspeed_10m,windgusts_10m,winddirection_10m&wind_speed_unit=kn&timezone=Europe%2FAmsterdam&past_days=1`;
    Promise.all([
      fetch(`${BASE}&forecast_days=8&models=gfs_seamless`).then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch(`${BASE}&forecast_days=8&models=knmi_seamless`).then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch(`${BASE}&forecast_days=3&models=knmi_harmonie_arome_netherlands`).then(r => { if (!r.ok) throw new Error(); return r.json(); }),
    ])
      .then(([base, seamless, arome]) => {
        const toMap = d => {
          const m = {};
          d.hourly.time.forEach((t, i) => { m[t] = { speed: d.hourly.windspeed_10m[i], gust: d.hourly.windgusts_10m[i], dir: d.hourly.winddirection_10m[i] }; });
          return m;
        };
        const seamlessMap = toMap(seamless);
        const aromeMap    = toMap(arome);
        // Pick best model per timestamp as a unit so speed+gust always come from the same source
        const merged = base.hourly.time.map((t, i) => {
          const a = aromeMap[t];
          if (a && a.speed != null && a.gust != null) return a;
          const k = seamlessMap[t];
          if (k && k.speed != null && k.gust != null) return k;
          return { speed: base.hourly.windspeed_10m[i], gust: base.hourly.windgusts_10m[i], dir: base.hourly.winddirection_10m[i] };
        });
        setApiData({ hourly: {
          time:               base.hourly.time,
          windspeed_10m:      merged.map(m => m.speed),
          windgusts_10m:      merged.map(m => m.gust),
          winddirection_10m:  merged.map(m => m.dir),
        }});
        setUpdated(new Date());
      })
      .catch(() => setError('Kon weerdata niet ophalen.'))
      .finally(() => { setLoading(false); setRefreshing(false); });
  }, [pos.lat, pos.lon]);

  if (loading) return (
    <div className="app" style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh' }}>
      <div style={{ textAlign:'center', color:'var(--muted)' }}>
        <div style={{ fontSize:36, marginBottom:10 }}>🌬️</div>
        <div>Winddata laden…</div>
      </div>
    </div>
  );
  if (error) return <div className="app" style={{ padding:24, color:'#dc2626' }}>{error}</div>;

  const { hourly } = apiData;
  const times = hourly.time, spds = hourly.windspeed_10m, gsts = hourly.windgusts_10m, drs = hourly.winddirection_10m;
  const now = new Date();
  const nowIso = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}T${String(now.getHours()).padStart(2,'0')}:00`;
  let ci = times.findIndex(t => t === nowIso);
  if (ci < 0) ci = times.length - 1;

  const displayIdx = selectedHourIdx ?? ci;
  const curKn = spds[displayIdx], curGustKn = gsts[displayIdx], curDir = drs[displayIdx];
  const s = suit(curGustKn, tw);
  const isLive = displayIdx === ci;

  /* 12h window — or full day when a day is selected */
  const chartHours = [];
  if (selectedDay) {
    for (let i=0; i<times.length; i++) {
      if (times[i].split('T')[0] !== selectedDay) continue;
      const d = new Date(times[i]);
      chartHours.push({ time:times[i], speed:spds[i], gust:gsts[i], dir:drs[i], isPast:i<ci, globalIdx:i, label:`${String(d.getHours()).padStart(2,'0')}u` });
    }
  } else {
    const s4 = Math.max(0, ci-4), e8 = Math.min(times.length-1, ci+7);
    for (let i=s4; i<=e8; i++) {
      const d = new Date(times[i]);
      chartHours.push({ time:times[i], speed:spds[i], gust:gsts[i], dir:drs[i], isPast:i<ci, globalIdx:i, label:`${String(d.getHours()).padStart(2,'0')}u` });
    }
  }

  /* 7-day: aggregate from current hour */
  const dayMap = {};
  for (let i=ci; i<times.length; i++) {
    const day = times[i].split('T')[0];
    if (!dayMap[day]) dayMap[day] = { speeds:[], gusts:[], dirs:[], date:times[i], dateKey: day };
    dayMap[day].speeds.push(spds[i]);
    dayMap[day].gusts.push(gsts[i]);
    dayMap[day].dirs.push(drs[i]);
  }
  const days = Object.values(dayMap).slice(0,7).map(d => {
    const avgSpd = d.speeds.reduce((a,b)=>a+b,0)/d.speeds.length;
    const maxGust = Math.max(...d.gusts);
    const midDir = d.dirs[Math.floor(d.dirs.length/2)];
    return { label: new Date(d.date).toLocaleDateString('nl-NL',{weekday:'short'}), dateKey: d.dateKey, avgSpd, maxGust, dir: midDir, s: suit(maxGust, tw) };
  });

  /* wind rose: 8 hours from display index */
  const roseSpeeds = spds.slice(displayIdx, displayIdx+8);
  const roseDirs   = drs.slice(displayIdx, displayIdx+8);

  return (
    <div className="app">
      {/* Header — sunset */}
      <div style={{ position:'relative', padding:'28px 24px 44px', color:'#fff', overflow:'hidden',
        background:'linear-gradient(180deg,#f5c06b 0%,#ee8b5b 22%,#d94f4a 48%,#1e5d8c 75%,#0a3a5f 100%)' }}>
        <div className="banner-stars"/>
        <div style={{ position:'relative', zIndex:2 }}>
          {/* top row */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ width:36, height:36, borderRadius:'50%', flexShrink:0,
                background:'linear-gradient(135deg,#1e6091,#0a3a5f)',
                boxShadow:'0 4px 14px rgba(10,58,95,.45), inset 0 0 0 1px rgba(255,255,255,.15)',
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                  <path d="M2 14 Q6 8 10 14 T18 14 T22 12" stroke="#ffe29a" strokeWidth="2.5" strokeLinecap="round"/>
                  <path d="M3 18 Q7 14 11 18 T19 18" stroke="#ffe29a" strokeWidth="2" strokeLinecap="round" opacity="0.7"/>
                </svg>
              </div>
              <div>
                <div style={{ fontFamily:'Archivo,sans-serif', fontSize:9, letterSpacing:'.32em', textTransform:'uppercase', opacity:.85, marginBottom:2 }}>Windrapport</div>
                <div style={{ fontFamily:'Archivo,sans-serif', fontWeight:900, fontSize:28, letterSpacing:'-.02em', lineHeight:1 }}>
                  Joppe<span style={{ color:'#ffe29a', textShadow:'0 1px 8px rgba(255,180,100,.3)' }}>Wind</span>
                </div>
              </div>
            </div>
            <div style={{ fontSize:10, letterSpacing:'.08em', background:'rgba(255,255,255,.18)', backdropFilter:'blur(8px)',
              padding:'5px 12px', borderRadius:999, border:'1px solid rgba(255,255,255,.28)', textAlign:'right', lineHeight:1.3 }}>
              <div style={{ fontSize:8, opacity:.7, textTransform:'uppercase', letterSpacing:'.14em' }}>Vernieuwd</div>
              {updated ? updated.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}) : '—'}
            </div>
          </div>
          {/* subline */}
          <div style={{ display:'flex', alignItems:'center', gap:10, fontSize:12, opacity:.95 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', flexShrink:0,
              background: isLive ? '#8ae68a' : 'rgba(255,255,255,0.35)',
              boxShadow: isLive ? '0 0 8px #8ae68a' : 'none',
            }}/>
            <span>
              {isLive ? 'Live' : times[displayIdx].split('T')[1].slice(0,5)}
              {' · '}{pos.lat === LAT && pos.lon === LON ? SPOT : `${pos.lat}, ${pos.lon}`}
              {' · '}{isLive
                ? now.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'})
                : new Date(times[displayIdx]).toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'})
              }
            </span>
          </div>
        </div>
        {/* wave */}
        <svg viewBox="0 0 400 40" preserveAspectRatio="none"
          style={{ position:'absolute', left:0, right:0, bottom:-1, width:'100%', height:40 }}>
          <path d="M0,25 Q100,5 200,20 T400,15 L400,40 L0,40 Z" fill={s.bg}/>
        </svg>
      </div>

      {/* Suitability banner */}
      <div style={{ background:s.bg, borderBottom:`2px solid ${s.color}33`, padding:'10px 20px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:14, color:s.dotColor }}>⬤</span>
          <span style={{ fontSize:14, fontWeight:600, color:s.color }}>{s.label}</span>
        </div>
        <span style={{ fontSize:12, color:s.color, opacity:.85 }}>
          {toUnit(curKn, tw.unit)}–{toUnit(curGustKn, tw.unit)} {unitLbl(tw.unit)} {degToCompass(curDir)}
        </span>
      </div>

      <div style={{ padding:'16px 14px', display:'flex', flexDirection:'column', gap:12 }}>

        {/* Wind + Windroos */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          <div className="card" style={{ padding:'14px 16px' }}>
            <div style={{ fontSize:11, color:'var(--muted)', fontWeight:500, textTransform:'uppercase', letterSpacing:'.08em', marginBottom:10, textAlign:'center' }}>
              {selectedHourIdx !== null ? `Wind ${times[displayIdx].split('T')[1].slice(0,5)}` : 'Wind nu'}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gridTemplateRows:'1fr 1fr', gap:0, marginTop:4 }}>
              {/* LB: gemiddeld */}
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'8px 0' }}>
                <div style={{ fontSize:36, fontWeight:700, color:'var(--sky)', lineHeight:1 }}>{toUnit(curKn, tw.unit)}</div>
                <div style={{ fontSize:11, color:'var(--muted)', marginTop:3 }}>{unitLbl(tw.unit)} gem.</div>
              </div>
              {/* RB: vlagen */}
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'8px 0' }}>
                <div style={{ fontSize:36, fontWeight:700, color:'var(--sky)', lineHeight:1 }}>{toUnit(curGustKn, tw.unit)}</div>
                <div style={{ fontSize:11, color:'var(--muted)', marginTop:3 }}>{unitLbl(tw.unit)} vlagen</div>
              </div>
              {/* LO: windvaan */}
              <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:'8px 0', borderTop:'1px solid var(--border)' }}>
                <WindArrow deg={curDir} size={44} color="var(--sky)"/>
              </div>
              {/* RO: kompas */}
              <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:'8px 0', borderTop:'1px solid var(--border)' }}>
                <div style={{ fontSize:22, fontWeight:700, color:'var(--sky)', letterSpacing:'.04em' }}>{degToCompass(curDir)}</div>
              </div>
            </div>
          </div>
          <div className="card" style={{ padding:'12px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
            <WindRose speeds={roseSpeeds} dirs={roseDirs} size={100}/>
            <div style={{ fontSize:11, color:'var(--muted)', marginTop:10 }}>
              {isLive ? 'komende 8 uur' : `8 uur v.a. ${times[displayIdx].split('T')[1].slice(0,5)}`}
            </div>
          </div>
        </div>

        {/* 12h chart */}
        <div className="card" style={{ padding:'16px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12 }}>
            <div style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>
              {selectedDay ? new Date(selectedDay).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'short'}) : '12-uurs overzicht'}
            </div>
            <div style={{ fontSize:11, color:'var(--muted)', cursor: (selectedDay||selectedHourIdx!==null)?'pointer':'default', textDecoration: (selectedDay||selectedHourIdx!==null)?'underline':'none' }}
              onClick={() => { setSelectedDay(null); setSelectedHourIdx(null); }}>
              {(selectedDay||selectedHourIdx!==null) ? '← terug naar nu' : '4u terug · 8u vooruit'}
            </div>
          </div>
          <WindChart hours={chartHours} unit={tw.unit} selectedIdx={displayIdx} currentIdx={ci} onSelect={setSelectedHourIdx}/>
        </div>

        {/* 7-day */}
        <div className="card" style={{ padding:'16px' }}>
          <div style={{ fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:12 }}>7-daagse voorspelling</div>

          {/* legend */}
          <div style={{ display:'flex', gap:12, marginBottom:10, fontSize:11, color:'var(--muted)' }}>
            <span style={{ display:'flex', gap:4, alignItems:'center' }}><span style={{ width:10, height:10, borderRadius:2, background:'var(--sky)', display:'inline-block' }}/>gemiddeld</span>
            <span style={{ display:'flex', gap:4, alignItems:'center' }}><span style={{ width:10, height:10, borderRadius:2, background:'var(--gust)', display:'inline-block' }}/>vlagen</span>
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
            {days.map((d,i) => {
              const maxBar = 40;
              const avgW = Math.min(100, (d.avgSpd / maxBar) * 100);
              const gustW = Math.min(100, (d.maxGust / maxBar) * 100);
              const isSelected = d.dateKey === selectedDay;
              return (
                <div key={i} onClick={() => setSelectedDay(isSelected ? null : d.dateKey)}
                  style={{ cursor:'pointer', borderRadius:8, padding:'4px 6px', margin:'0 -6px',
                    background: isSelected ? 'var(--sky-pale)' : 'transparent',
                    transition:'background .15s' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
                    <div style={{ width:32, fontSize:12, fontWeight: i===0||isSelected?700:500, color: i===0||isSelected?'var(--sky)':'var(--text)' }}>{i===0?'Van.':d.label}</div>
                    <WindArrow deg={d.dir} size={14} color={d.s.color}/>
                    <span style={{ fontSize:11, color:d.s.color, fontWeight:600, marginLeft:2 }}>{d.s.short}</span>
                    <div style={{ marginLeft:'auto', display:'flex', gap:6, fontSize:12, fontWeight:600 }}>
                      <span style={{ color:'var(--sky)' }}>{toUnit(d.avgSpd, tw.unit)}</span>
                      <span style={{ color:'var(--muted)', fontWeight:400 }}>/</span>
                      <span style={{ color:'#0369a1' }}>{toUnit(d.maxGust, tw.unit)} {unitLbl(tw.unit)}</span>
                    </div>
                  </div>
                  {/* stacked bars */}
                  <div style={{ position:'relative', height:8, background:'var(--border)', borderRadius:4 }}>
                    <div style={{ position:'absolute', top:0, left:0, height:'100%', width:`${gustW}%`, background:'var(--gust)', borderRadius:4 }}/>
                    <div style={{ position:'absolute', top:0, left:0, height:'100%', width:`${avgW}%`, background:'var(--sky)', borderRadius:4 }}/>
                  </div>
                </div>
              );
            })}

          </div>
        </div>

        {/* Map — full width */}
        <div className="card" style={{ overflow:'hidden', height:200, position:'relative' }}>
          {refreshing && <div style={{ position:'absolute', top:8, left:'50%', transform:'translateX(-50%)', zIndex:999,
            background:'rgba(26,92,138,.9)', color:'#fff', fontSize:11, padding:'4px 12px', borderRadius:999 }}>Laden…</div>}
          <SpotMap lat={pos.lat} lon={pos.lon} onMove={moveToPos} windDir={curDir} windSpeed={curKn}/>
        </div>
      </div>

      {/* Tweaks */}
      <div className={`tweaks-panel${twOpen?' visible':''}`}>
        <h4>Tweaks</h4>
        <div className="tweak-row">
          <div className="tweak-row-top"><label>Eenheid</label></div>
          <select value={tw.unit} onChange={e=>setTweak('unit',e.target.value)}>
            <option value="kn">knopen (kn)</option>
            <option value="bft">Beaufort</option>
            <option value="m/s">m/s</option>
            <option value="km/h">km/h</option>
          </select>
        </div>
        {[
          { key:'margMin',  label:'Marginaal vanaf (kn)' },
          { key:'redMin',   label:'Redelijk vanaf (kn)'  },
          { key:'goodMin',  label:'Goed vanaf (kn)'      },
          { key:'greatMin', label:'Heel goed vanaf (kn)' },
          { key:'stormMin', label:'Hard vanaf (kn)'      },
        ].map(({key,label}) => (
          <div key={key} className="tweak-row">
            <div className="tweak-row-top">
              <label>{label}</label>
              <span className="tweak-val">{tw[key]} kn</span>
            </div>
            <input type="range" min={5} max={50} step={1} value={tw[key]} onChange={e=>setTweak(key,+e.target.value)}/>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
